version: "3.8"

services:
  backend:
    build: ./logic
    container_name: backend
    ports:
      - "3000:3000"
    restart: always

  frontend:
    build: ./reactApp/dowie-node
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf