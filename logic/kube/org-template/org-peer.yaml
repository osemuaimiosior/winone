---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: "{{ORG}}-peer{{PEER_NUMBER}}-tls-cert"
  namespace: {{NAME_SPACE}}
spec:
  isCA: false
  privateKey:
    algorithm: ECDSA
    size: 256
  dnsNames:
    - localhost
    - "{{ORG}}-peer{{PEER_NUMBER}}"
    - "{{ORG}}-peer{{PEER_NUMBER}}.{{NAME_SPACE}}.svc.cluster.local"
    - "{{ORG}}-peer{{PEER_NUMBER}}.${DOMAIN}"
    - "{{ORG}}-peer-gateway-svc"
    - "{{ORG}}-peer-gateway-svc.${DOMAIN}"
  ipAddresses:
    - 127.0.0.1
  secretName: "{{ORG}}-peer{{PEER_NUMBER}}-tls-cert"
  issuerRef:
    name: "{{ORG}}-tls-cert-issuer"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ORG}}-peer{{PEER_NUMBER}}-config"
data:
  FABRIC_CFG_PATH: /var/hyperledger/fabric/config
  FABRIC_LOGGING_SPEC: "debug:cauthdsl,policies,msp,grpc,peer.gossip.mcs,gossip,leveldbhelper=info"
  CORE_PEER_TLS_ENABLED: "true"
  CORE_PEER_TLS_CERT_FILE: /var/hyperledger/fabric/config/tls/tls.crt
  CORE_PEER_TLS_KEY_FILE: /var/hyperledger/fabric/config/tls/tls.key
  CORE_PEER_TLS_ROOTCERT_FILE: /var/hyperledger/fabric/config/tls/ca.crt
  CORE_PEER_ID: "{{ORG}}-peer{{PEER_NUMBER}}.{{ORG}}.example.com"
  CORE_PEER_ADDRESS: "{{ORG}}-peer{{PEER_NUMBER}}:7051"
  CORE_PEER_LISTENADDRESS: 0.0.0.0:7051
  CORE_PEER_CHAINCODEADDRESS: "{{ORG}}-peer{{PEER_NUMBER}}:7052"
  CORE_PEER_CHAINCODELISTENADDRESS: 0.0.0.0:7052
  # bootstrap peer is the other peer in the same org
  CORE_PEER_GOSSIP_BOOTSTRAP: "{{ORG}}-peer2:7051"
  CORE_PEER_GOSSIP_EXTERNALENDPOINT: "{{ORG}}-peer{{PEER_NUMBER}}.{{NAME_SPACE}}.svc.cluster.local:7051"
  CORE_PEER_LOCALMSPID: Org2MSP
  CORE_PEER_MSPCONFIGPATH: /var/hyperledger/fabric/organizations/peerOrganizations/{{ORG}}.example.com/peers/{{ORG}}-peer{{PEER_NUMBER}}.{{ORG}}.example.com/msp
  CORE_OPERATIONS_LISTENADDRESS: 0.0.0.0:9443
  CORE_PEER_FILESYSTEMPATH: /var/hyperledger/fabric/data/{{ORG}}-peer{{PEER_NUMBER}}.{{ORG}}.example.com
  CORE_LEDGER_SNAPSHOTS_ROOTDIR: /var/hyperledger/fabric/data/{{ORG}}-peer{{PEER_NUMBER}}.{{ORG}}.example.com/snapshots
  CHAINCODE_AS_A_SERVICE_BUILDER_CONFIG: "{\"peername\":\"{{ORG}}peer{{PEER_NUMBER}}\"}"
  FABRIC_K8S_BUILDER_OBJECT_NAME_PREFIX: "{{ORG}}-peer{{PEER_NUMBER}}-cc"
  CORE_LEDGER_STATE_STATEDATABASE: CouchDB
  CORE_LEDGER_STATE_COUCHDBCONFIG_MAXRETRIESONSTARTUP: "20"
  CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS: localhost:5984
  CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME: admin
  CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD: adminpw
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ORG}}-peer{{PEER_NUMBER}}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "{{ORG}}-peer{{PEER_NUMBER}}"
  template:
    metadata:
      labels:
        app: "{{ORG}}-peer{{PEER_NUMBER}}"
        org: {{ORG}}
    spec:
      containers:
        - name: main
          image: ${FABRIC_PEER_IMAGE}
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: "{{ORG}}-peer{{PEER_NUMBER}}-config"
          ports:
            - containerPort: 7051
            - containerPort: 7052
            - containerPort: 9443
          volumeMounts:
            - name: fabric-volume
              mountPath: /var/hyperledger
            - name: fabric-config
              mountPath: /var/hyperledger/fabric/config
            - name: tls-cert-volume
              mountPath: /var/hyperledger/fabric/config/tls
              readOnly: true
            - name: msp-config
              mountPath: /var/hyperledger/fabric/organizations/peerOrganizations/{{ORG}}.example.com/peers/{{ORG}}-peer{{PEER_NUMBER}}.{{ORG}}.example.com/msp/config.yaml
              subPath: config.yaml
              readOnly: true
        - name: couchdb
          image: couchdb:${COUCHDB_VERSION}
          imagePullPolicy: IfNotPresent
          env:
            - name: "COUCHDB_USER"
              value: "admin" 
            - name: "COUCHDB_PASSWORD"
              value: "adminpw"
          ports:
              - containerPort: 5984
      volumes:
        - name: fabric-volume
          persistentVolumeClaim:
            claimName: fabric-{{ORG}}
        - name: fabric-config
          configMap:
            name: "{{ORG}}-config"
        - name: msp-config
          configMap:
            name: "{{ORG}}-peer{{PEER_NUMBER}}-msp-config"
        - name: tls-cert-volume
          secret:
            secretName: "{{ORG}}-peer{{PEER_NUMBER}}-tls-cert"          
---
apiVersion: v1
kind: Service
metadata:
  name: "{{ORG}}-peer{{PEER_NUMBER}}"
spec:
  ports:
    - name: grpc
      port: 7051
      protocol: TCP
    - name: chaincode
      port: 7052
      protocol: TCP
    - name: operations
      port: 9443
      protocol: TCP
  selector:
    app: "{{ORG}}-peer{{PEER_NUMBER}}"
---
apiVersion: v1
kind: Service
metadata:
  name: "{{ORG}}-peer-gateway-svc"
spec:
  ports:
    - name: grpc
      port: 7051
      protocol: TCP
  selector:
    org: {{ORG}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    nginx.ingress.kubernetes.io/proxy-connect-timeout: 60s
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
  labels:
    app: "{{ORG}}-peer{{PEER_NUMBER}}"
  name: "{{ORG}}-peer{{PEER_NUMBER}}"
spec:
  ingressClassName: nginx
  rules:
    - host: "{{ORG}}-peer{{PEER_NUMBER}}.${DOMAIN}"
      http:
        paths:
          - backend:
              service:
                name: "{{ORG}}-peer{{PEER_NUMBER}}"
                port:
                  name: grpc
            path: /
            pathType: ImplementationSpecific
    - host: "{{ORG}}-peer-gateway-svc.${DOMAIN}"
      http:
        paths:
          - backend:
              service:
                name: "{{ORG}}-peer-gateway-svc"
                port:
                  name: grpc
            path: /
            pathType: ImplementationSpecific
  tls:
    - hosts:
        - "{{ORG}}-peer{{PEER_NUMBER}}.${DOMAIN}"
    - hosts:
        - "{{ORG}}-peer-gateway-svc.${DOMAIN}"
