syntax = "proto3";

package message;

option go_package = ".;message";

message StartMessage {
  int32 startUpNodeCount = 1;
  int64 startDateUnix = 2;
}

message StartResponse {
  string message = 1;
}

message NewJobRequest {
  double s0 = 1;        
  double k = 2;         
  double sigma = 3;       
  double r = 4;         
  double t = 5;         
  int32 numSim = 6;     
}