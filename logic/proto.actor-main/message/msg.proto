syntax = "proto3";

package message;

option go_package = "message";

message StartMessage {
  int32 startUpNodeCount = 1;
  int64 startDateUnix = 2;
}

message StartResponse {
  string message = 1;
}

message NewJobRequest {
  double s0 = 1;        
  double k = 2;         
  double sigma = 3;       
  double r = 4;         
  double t = 5;         
  int32 numSim = 6;     
}

message NewJobResponse {
	int32 Code = 1;
	string Result = 2;
}

message Error {
	int32 Code = 1;
	string Message = 2;
}

message OptionsRequest {
  double SpotPrice = 1;
  double StrikePrice = 2;
  double Volatility = 3;
  double RiskFreeRate = 4;
  double Maturity = 5;
  int32 Simulations = 6;
}