syntax = "proto3";

package registry;

service Registry {

    rpc checkNodeById(Details) returns (StatusMessage) {}
    rpc checkAuthClientDetails(Detailstwo) returns (StatusMessage) {}
    rpc registerNodeDetails(Detailsthree) returns (StatusMessage) {}
}

message Details {
    string nodeId = 1;
    string machineFingerprint = 2;
}

message Detailstwo {
    string USER_AUTH = 1;
    string ID = 2;
}

message UserToken {
    string USER_AUTH = 1;
    string ID = 2;
}

message NodePayload {
    string nodeId = 1;
    int32 cpuUsage = 2;
    string systemInfo = 3;
    string platform = 4;
    double cpuCores = 5;
    double ramTotal = 6;
    double ramFree = 7;
    int32 gpuUtilization = 8;
    int32 gpuMemoryFree = 9;
    int32 temperature = 10;
    int32 simulationsPerSecond = 11;
    int64 uptime = 12;
    string nodeStatus = 13;
    string jobStatus = 14;
    string machineFingerprint = 15;
    double nodeScore = 16;
    string lastHeartbeat = 17;
}

message Detailsthree {
    NodePayload nodePayload = 1;
    UserToken userToken = 2;
}

message StatusMessage {
    string message = 1;
    string details = 2;
}